name: fmt

on:
  push:
    branches: [ "master" ]
    paths:
      - '**.rs'
  pull_request:
    branches: [ "master" ]
    paths:
      - '**.rs'

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v5

    - name: fmt
      run: cargo fmt --all -- --check
