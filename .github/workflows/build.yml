name: Build

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build:

    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v6

    - name: Download Npcap SDK
      run: |
        curl -L -o npcap-sdk.zip https://npcap.com/dist/npcap-sdk-1.16.zip

    - name: Extract wpcap.lib from Npcap SDK
      run: |
        tar -xvf npcap-sdk.zip Lib/x64/wpcap.lib

    - name: Copy wpcap.lib into project root
      run: |
        copy .\Lib\x64\wpcap.lib .
    
    - name: Build
      run: cargo build --release --verbose

    - name: Test
      run: cargo test

    - name: Upload artifacts
      uses: actions/upload-artifact@v7
      with: 
        name: binaries
        path: target/release/*.exe
